name: Task 2 - Install K8s, Minikube, Helm

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: "IP адреса ВМ для встановлення"
        required: true
        default: "138.68.77.178"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo pip3 install ansible

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.target_host }} >> ~/.ssh/known_hosts

      - name: Update inventory with input host
        run: |
          echo "[web]" > task2/inventory.ini
          echo "${{ github.event.inputs.target_host }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa" >> task2/inventory.ini

      - name: Validate playbook (dry-run)
        run: |
          ansible-playbook -i task2/inventory.ini task2/playbook.yml --check --diff

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo pip3 install ansible

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ github.event.inputs.target_host }} >> ~/.ssh/known_hosts

      - name: Update inventory with input host
        run: |
          echo "[web]" > task2/inventory.ini
          echo "${{ github.event.inputs.target_host }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa" >> task2/inventory.ini

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i task2/inventory.ini task2/playbook.yml -v
